[build]
  publish = "."
  command = "echo 'Portfolio build complete'"

[build.environment]
  NODE_VERSION = "18"

# Enhanced Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://apis.google.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.lineicons.com https://fonts.googleapis.com; font-src 'self' https://cdnjs.cloudflare.com https://cdn.lineicons.com https://fonts.gstatic.com; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com wss://*.firebaseio.com https://www.google-analytics.com; img-src 'self' data: https: blob:; media-src 'self' https:; object-src 'none'; base-uri 'self'; form-action 'self';"

# Cache Control for Assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Vary = "Accept-Encoding"

# Cache Control for HTML
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Vary = "Accept-Encoding"

# Cache Control for Data
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

# Cache Control for Images
[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
    Vary = "Accept-Encoding"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
    Vary = "Accept-Encoding"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
    Vary = "Accept-Encoding"

# Cache Control for Fonts
[[headers]]
  for = "*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Admin Panel Redirects
[[redirects]]
  from = "/admin"
  to = "https://2fuhpvka9lh8sbmxouzih2gm20sh6zmesvf.netlify.app/"
  status = 302
  force = true

[[redirects]]
  from = "/admin/*"
  to = "https://2fuhpvka9lh8sbmxouzih2gm20sh6zmesvf.netlify.app/"
  status = 302
  force = true

# SPA Fallback for Projects
[[redirects]]
  from = "/projects/*"
  to = "/projects.html"
  status = 200

[[redirects]]
  from = "/project/*"
  to = "/single-product.html"
  status = 200

# Force HTTPS
[[redirects]]
  from = "http://sethupathy.iot-hub.in/*"
  to = "https://sethupathy.iot-hub.in/:splat"
  status = 301
  force = true

# 404 Page
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# Prerender for SEO
[[plugins]]
  package = "@netlify/plugin-sitemap"

  [plugins.inputs]
    buildDir = "."
    exclude = [
      "/admin/**",
      "/Main_portfolio_backend/**",
      "/test-json-structure.html",
      "/page-preview-generator.html"
    ]