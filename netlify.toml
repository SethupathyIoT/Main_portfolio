[build]
  publish = "."
  command = "echo 'Portfolio build complete'"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300"
    Access-Control-Allow-Origin = "*"

[[redirects]]
  from = "/admin"
  to = "https://2fuhpvka9lh8sbmxouzih2gm20sh6zmesvf.netlify.app/"
  status = 302

[[redirects]]
  from = "/admin/*"
  to = "https://2fuhpvka9lh8sbmxouzih2gm20sh6zmesvf.netlify.app/"
  status = 302